name: AIWF Develop Gate

on:
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Initialize workspace
        run: aiwf init --self-hosted

      - name: Seed minimal plan and role workflow
        run: |
          cat > .ai/plan.json <<'JSON'
          {
            "project_id": "aiwf",
            "version": 1,
            "tasks": [
              {"id": "PR-CHECK", "status": "completed"}
            ]
          }
          JSON
          aiwf roles init

      - name: Run primary develop gate
        run: |
          aiwf develop
          aiwf audit-summary

      - name: Upload AIWF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aiwf-artifacts
          path: |
            .ai/state.json
            .ai/runs
            .ai/artifacts/reports
            .ai/telemetry/events.jsonl
          if-no-files-found: warn
