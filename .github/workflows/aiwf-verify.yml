name: AIWF CI

on:
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run unit tests
        run: |
          PYTHONPATH=src python -m pytest tests/ -q

      - name: Upload AIWF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aiwf-artifacts
          path: |
            .ai/state.json
            .ai/runs
            .ai/telemetry/events.jsonl
          if-no-files-found: warn
